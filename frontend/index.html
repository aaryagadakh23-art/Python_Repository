<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Student Management</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Student Management System</h1>

    <form id="studentForm">

        <input
            type="hidden"
            id="studentId"
        >

        <input
            type="text"
            id="name"
            placeholder="Student Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="number"
            id="age"
            placeholder="Age"
            required
        >

        <button type="submit">

            Save Student

        </button>

    </form>

    <table>

        <thead>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Email</th>

            <th>Age</th>

            <th>Actions</th>

        </tr>

        </thead>

        <tbody id="studentTable">

        </tbody>

    </table>

</div>

<script src="script.js"></script>

</body>

</html>
